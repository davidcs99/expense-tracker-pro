_format_version: "2.1"

services:
  - name: api
    url: http://api:8080
    routes:
      - name: api-main-route
        paths:
          - /api
        strip_path: false
        methods: [ GET, POST, PUT, DELETE, OPTIONS ]
        protocols: [ http, https ]

plugins:
  - name: cors
    config:
      origins: ["http://localhost:3000"]
      methods: ["GET","POST","PUT","DELETE" , "OPTIONS"]
      headers: ["Content-Type", "Authorization", "Accept"]  
      credentials: true
